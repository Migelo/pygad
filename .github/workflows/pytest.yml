name: PyTest CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Cache auxiliary data
        uses: actions/cache@v4
        with:
          path: |
            ./pygad/CoolingTables
            ./pygad/iontbls
            ./pygad/bc03
            ./pygad/snaps
          key: aux-data-${{ runner.os }}-python-${{ matrix.python-version }}
          restore-keys: |
            aux-data-${{ runner.os }}-python-
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgsl-dev g++ gcc build-essential
      - name: Install package
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -e .
          pip install pytest
      - name: Verify auxiliary data (diagnostic)
        env:
          PYGAD_SKIP_DATA_BOOTSTRAP: "1"
        run: |
          .venv/bin/python - <<'EOF'
          import os, shutil, pygad
          from pygad import environment
          md = environment.module_dir
          print('module_dir:', md)
          print('module_dir contents:', sorted(os.listdir(md)))
          d = os.path.join(md, 'iontbls')
          print('iontbls exists:', os.path.isdir(d))
          if os.path.isdir(d):
              print('iontbls contents:', sorted(os.listdir(d)))
          print('tbls-i45 exists:', os.path.isdir(os.path.join(d, 'tbls-i45')))
          print('disk usage:', shutil.disk_usage(md))
          EOF
      - name: Run existing doctests
        env:
          PYGAD_SKIP_DATA_BOOTSTRAP: "1"
        run: .venv/bin/python runTestsAll.py
      - name: Run pytest
        env:
          PYGAD_SKIP_DATA_BOOTSTRAP: "1"
        run: .venv/bin/python -m pytest
