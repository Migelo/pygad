name: PyTest CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Cache auxiliary data
        uses: actions/cache@v4
        with:
          path: |
            ./pygad/CoolingTables
            ./pygad/iontbls
            ./pygad/bc03
            ./pygad/snaps
          key: aux-data-${{ runner.os }}-python-${{ matrix.python-version }}
          restore-keys: |
            aux-data-${{ runner.os }}-python-
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgsl-dev g++ gcc build-essential
      - name: Install package
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -e .
          pip install pytest
      - name: Run pytest
        env:
          PYGAD_SKIP_DATA_BOOTSTRAP: "1"
        run: .venv/bin/python -m pytest
