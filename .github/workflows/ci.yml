name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Set up pygad
        uses: ./.github/actions/setup-pygad
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run pytest
        run: .venv/bin/python -m pytest

  doctests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Set up pygad
        uses: ./.github/actions/setup-pygad
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run doctest suite
        run: .venv/bin/python runTestsAll.py
      - name: Test plotting
        run: |
          cp tests/QuickStart.py .
          .venv/bin/python QuickStart.py
